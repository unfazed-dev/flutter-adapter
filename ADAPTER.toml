# Flutter Adapter — Manifest
# MCP server card format + CrewAI agent list.
# Read by `maestro kit install` to resolve abstract roles → concrete agents.

name = "flutter-adapter"
version = "1.1.0"
description = "Flutter stack specialist — mobile + web agents, HIG/M3/shadcn design systems, Stacked MVVM, PlatformView embeds, probe-runner verification"
class = "frontend"

[author]
name = "Maestro Platform"
url = "https://github.com/maestro-adapters/flutter-adapter"

[[agents]]
role = "requirement-analyst"
path = "discovery/requirement-analyst.toml"
description = "Translates project briefs and design files into structured requirements"

[[agents]]
role = "context-mapper"
path = "discovery/context-mapper.toml"
description = "Identifies bounded contexts, maps screen-to-context assignments"

[[agents]]
role = "spec-author"
path = "specification/spec-author.toml"
description = "Generates design system specs from primitives and composite lists"

[[agents]]
role = "entity-designer"
path = "domain/entity-designer.toml"
description = "Designs DDD domain entities, value objects, aggregates, and repositories"

[[agents]]
role = "infra-builder"
path = "infrastructure/persistence/infra-builder.toml"
description = "Sets up infrastructure: migrations, edge functions, config, storage"

[[agents]]
role = "state-manager"
path = "application/state-manager.toml"
description = "Implements application services, commands, queries, and state management"

[[agents]]
role = "navigation-designer"
path = "application/navigation-designer.toml"
description = "Designs route tables, deep linking, and navigation patterns"

[[agents]]
role = "hig-theme-builder"
path = "presentation/hig-theme-builder.toml"
description = "Generates Cupertino/HIG theme from design tokens — Liquid Glass materials, iOS color system, SF typography"

[[agents]]
role = "m3-theme-builder"
path = "presentation/m3-theme-builder.toml"
description = "Generates Material Design 3 theme — tonal palettes, elevation system, state layers"

[[agents]]
role = "shadcn-theme-builder"
path = "presentation/shadcn-theme-builder.toml"
description = "Generates shadcn_flutter theme — ShadTheme configuration, color scheme, radii scale"

[[agents]]
role = "hig-widget-composer"
path = "presentation/hig-widget-composer.toml"
description = "Builds iOS-native Flutter widgets with PlatformView embeds — Cupertino + UiKitView SwiftUI wrappers"

[[agents]]
role = "m3-widget-composer"
path = "presentation/m3-widget-composer.toml"
description = "Builds Android-native Flutter widgets with PlatformView embeds — Material + AndroidView Compose wrappers"

[[agents]]
role = "shadcn-widget-composer"
path = "presentation/shadcn-widget-composer.toml"
description = "Builds mobile Flutter widgets using shadcn_flutter — accessible components with built-in a11y"

[[agents]]
role = "replica-widget-composer"
path = "presentation/replica-widget-composer.toml"
description = "Generates pure Flutter pixel-perfect replicas from design mockups — design is single source of truth"

[[agents]]
role = "test-runner"
path = "quality/test-runner.toml"
description = "Runs Flutter unit, widget, and integration tests; reports results"

[[agents]]
role = "code-reviewer"
path = "quality/code-reviewer.toml"
description = "Reviews Flutter/Dart code for best practices, DDD discipline, test coverage"

[[agents]]
role = "hig-design-critic"
path = "quality/hig-design-critic.toml"
description = "Validates iOS/HIG output — Liquid Glass correctness, Cupertino conformance, iOS deviations"

[[agents]]
role = "m3-design-critic"
path = "quality/m3-design-critic.toml"
description = "Validates Android/M3 output — tonal palette accuracy, elevation levels, state layers"

[[agents]]
role = "build-agent"
path = "delivery/build-agent.toml"
description = "Builds Flutter APK/IPA/web artifacts, runs CI checks"

[[agents]]
role = "deploy-agent"
path = "delivery/deploy-agent.toml"
description = "Deploys to app stores, Shorebird code push, or web hosting"

[[agents]]
role = "env-doctor"
path = "operations/env-doctor.toml"
description = "Validates Flutter/Dart/CocoaPods/Android SDK environment"

[[agents]]
role = "spec-inspector"
path = "quality/spec-inspector.toml"
description = "Validates design analysis against known spec schemas — primitives, states, variants, tokens"

[[agents]]
role = "code-critic"
path = "quality/code-critic.toml"
description = "Checks DDD layer discipline, TDD compliance, code structure, naming conventions"

[[agents]]
role = "stacked-scaffolder"
path = "delivery/stacked-scaffolder.toml"
description = "Scaffolds the Stacked MVVM project skeleton via stacked create app"

[[agents]]
role = "idempotency-verifier"
path = "operations/idempotency-verifier.toml"
description = "Runs probe-runner to verify golden-spec fidelity and snapshot idempotency"

[[skills]]
name = "flutter-tdd"
description = "Test-driven development for Flutter/Dart with widget testing and Golden tests"

[[skills]]
name = "flutter-code-review"
description = "Flutter/Dart code review with best practice checks and DDD layer discipline"

[[skills]]
name = "flutter-ui-design"
description = "Shared Flutter design fundamentals — layout, composition, responsive patterns, widget lifecycle"

[[skills]]
name = "flutter-hig-design"
description = "Apple HIG design patterns — Cupertino widgets, Liquid Glass materials, iOS color system, iOS deviations"

[[skills]]
name = "flutter-m3-design"
description = "Material Design 3 patterns — tonal palettes, elevation system, state layers, dynamic color"

[[skills]]
name = "flutter-debugging"
description = "Flutter-specific debugging: CanvasKit rendering, widget tree, state inspection, platform validation"

[[skills]]
name = "flutter-platform-validation"
description = "PlatformView and native embed validation on Android and iOS"

[[skills]]
name = "flutter-stacked"
description = "Stacked MVVM patterns — ViewModels, Views, service registration, routing"

[[skills]]
name = "flutter-platformview"
description = "PlatformView native embed code generation — UiKitView/AndroidView factories, MethodChannel bridges"

[capabilities]
roles = [
  "requirement-analyst",
  "context-mapper",
  "spec-author",
  "entity-designer",
  "infra-builder",
  "state-manager",
  "navigation-designer",
  "hig-theme-builder",
  "m3-theme-builder",
  "shadcn-theme-builder",
  "hig-widget-composer",
  "m3-widget-composer",
  "shadcn-widget-composer",
  "replica-widget-composer",
  "test-runner",
  "code-reviewer",
  "hig-design-critic",
  "m3-design-critic",
  "build-agent",
  "deploy-agent",
  "env-doctor",
  "spec-inspector",
  "code-critic",
  "stacked-scaffolder",
  "idempotency-verifier"
]
stacks = ["flutter", "dart"]
platforms = ["ios", "android"]

[slots]
build-presentation = [
  "hig-theme-builder", "m3-theme-builder",
  "hig-widget-composer", "m3-widget-composer",
  "state-manager", "navigation-designer"
]
build-release = ["build-agent", "deploy-agent"]
validate-environment = ["env-doctor"]
validate-design = ["hig-design-critic", "m3-design-critic"]
review-code = ["code-reviewer"]
audit-structure = ["code-critic"]
