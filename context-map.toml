# Flutter Adapter — Context Map
# DDD bounded contexts and their integration relationships.

[[contexts]]
name = "discovery"
description = "Requirement gathering and context mapping from design files"
owner = "requirement-analyst"

[[contexts]]
name = "specification"
description = "Design system specs and component definitions"
owner = "spec-author"

[[contexts]]
name = "domain"
description = "Core domain entities, value objects, aggregates"
owner = "entity-designer"

[[contexts]]
name = "infrastructure"
description = "Database, storage, external services"
owner = "infra-builder"

[[contexts]]
name = "application"
description = "Application services, state management, commands"
owner = "state-manager"

[[contexts]]
name = "presentation"
description = "Flutter widgets across HIG/M3/shadcn design systems"
owner = "hig-widget-composer"

[[contexts]]
name = "quality"
description = "Testing, code review, design critique"
owner = "test-runner"

[[contexts]]
name = "delivery"
description = "Build and deployment"
owner = "build-agent"

[[contexts]]
name = "operations"
description = "Environment validation and tooling"
owner = "env-doctor"

[[contexts]]
name = "hig-design-system"
description = "Apple HIG design system — Cupertino theme, Liquid Glass materials, iOS platform patterns"
owner = "hig-theme-builder"

[[contexts]]
name = "m3-design-system"
description = "Material Design 3 system — tonal palettes, elevation, state layers, Android platform patterns"
owner = "m3-theme-builder"

[[contexts]]
name = "shadcn-design-system"
description = "shadcn_flutter design system — accessible components for mobile"
owner = "shadcn-theme-builder"

[[contexts]]
name = "replica-mode"
description = "Pure Flutter pixel-perfect replica rendering — no native widgets, design as source of truth"
owner = "replica-widget-composer"

[[relationships]]
upstream = "discovery"
downstream = "specification"
pattern = "customer-supplier"
description = "Specifications are generated from discovered requirements"

